<!DOCTYPE html
  PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office" lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />

  <title>azm Academy Invitation</title>

  <style type="text/css">
    @font-face {
      font-family: 'AzmCustomFont';
      src: url('https://azm-edu-invitation.com/azm/fonts/Fund-Regular-v2.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body,
    table,
    td,
    a,
    p {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    table,
    td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
      border-collapse: collapse;
    }

    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      outline: none;
      text-decoration: none;
      display: block;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #F7F3EC;
      font-family: 'AzmCustomFont', Arial, Helvetica, sans-serif;
    }

    @media screen and (max-width: 900px) {
      .outer-wrapper {
        width: 100% !important;
        max-width: 100% !important;
      }

      .inner-wrapper {
        width: 100% !important;
        max-width: 100% !important;
      }

      .mobile-img {
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
      }

      .outer-padding {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .content-padding {
        padding-left: 28px !important;
        padding-right: 28px !important;
      }

      .guest-text {
        font-size: 16px !important;
        line-height: 24px !important;
      }
    }
  </style>

  <!--[if gte mso 9]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
</head>

<body bgcolor="#F7F3EC" style="margin:0; padding:0; background-color:#F7F3EC;">

  <center style="width:100%; background-color:#F7F3EC;">

    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#F7F3EC"
      style="width:100%; background-color:#F7F3EC; margin:0; padding:0;">

      <tr>
        <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0 0 30px 0;">

          <!-- OUTER GREEN BACKGROUND - 900PX -->
          <table class="outer-wrapper" role="presentation" border="0" cellpadding="0" cellspacing="0" width="900"
            bgcolor="#F7F3EC" style="width:900px; max-width:900px; background-color:#F7F3EC; margin:0 auto;">

            <tr>
              <td align="center" bgcolor="#F7F3EC" class="outer-padding" style="background-color:#F7F3EC; padding:0;">

                <!-- INNER CONTENT - 900PX -->
                <table class="inner-wrapper" role="presentation" border="0" cellpadding="0" cellspacing="0" width="900"
                  bgcolor="#F7F3EC" style="width:900px; max-width:900px; background-color:#F7F3EC; margin:0 auto;">

                  <!-- LOGO -->
                  <tr>
                    <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0; margin:0;">

                      <img src="https://azm-edu-invitation.com/azm/azmlogos.jpg" alt="PIF azm azm Academy" width="900"
                        class="mobile-img" style="display:block; width:900px; max-width:100%; height:auto; border:0;" />

                    </td>
                  </tr>

                  <!-- DYNAMIC NAME -->
                  <tr>
                    <td align="center" bgcolor="#025D4D" class="content-padding"
                      style="background-color:#025D4D; padding:30px 70px 20px 70px; font-family:'AzmCustomFont', Arial, Helvetica, sans-serif;">

                      <p id="guestName" class="guest-text"
                        style="margin:0; padding:0; text-align:center; font-family:'AzmCustomFont', Arial, Helvetica, sans-serif; font-size:28px; line-height:44px; color:#ffffff;">
                        Dear Guest,
                      </p>

                    </td>
                  </tr>

                  <!-- MAIN INVITATION IMAGE -->
                  <tr>
                    <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0; margin:0;">

                      <img src="https://azm-edu-invitation.com/azm//tier2/agenda2.jpg"
                        alt="azm Academy Graduation Ceremony Invitation Details" width="900" class="mobile-img"
                        style="display:block; width:900px; max-width:100%; height:auto; border:0;" />

                    </td>
                  </tr>

                  <!-- RSPV BUTTON IMAGE -->
                  <tr>
                    <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0; margin:0;">

                      <a id="rsvpLink" href="#" target="_blank"
                        style="display:block; text-decoration:none; border:0; outline:none; margin:0; padding:0;">

                        <img src="https://azm-edu-invitation.com/azm/rspv.jpg" alt="RSVP" width="900" class="mobile-img"
                          border="0"
                          style="display:block; width:900px; max-width:100%; height:auto; border:0; outline:none; text-decoration:none;" />

                      </a>

                    </td>
                  </tr>

                  <!-- LOCATION BUTTON IMAGE -->
                  <tr>
                    <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0; margin:0;">

                      <a href="https://maps.app.goo.gl/ruBz3TR22Bp168FB6" target="_blank"
                        style="display:block; text-decoration:none; border:0; outline:none; margin:0; padding:0;">

                        <img src="https://azm-edu-invitation.com/azm/location1.jpg" alt="Location" width="900"
                          class="mobile-img" border="0"
                          style="display:block; width:900px; max-width:100%; height:auto; border:0; outline:none; text-decoration:none;" />

                      </a>

                    </td>
                  </tr>

                  <!-- SIGNATURE -->
                  <tr>
                    <td align="center" bgcolor="#F7F3EC" style="background-color:#F7F3EC; padding:0; margin:0;">

                      <img src="https://azm-edu-invitation.com/azm/tier2/signature1.jpg" alt="Signature" width="900"
                        class="mobile-img" style="display:block; width:900px; max-width:100%; height:auto; border:0;" />

                    </td>
                  </tr>

                </table>
                <!-- END INNER CONTENT -->

              </td>
            </tr>
          </table>
          <!-- END OUTER GREEN BACKGROUND -->

        </td>
      </tr>
    </table>

  </center>

  <script type="text/javascript">
    (function () {
      var params = new URLSearchParams(window.location.search);
      var name = params.get("name");
      var uniqueId = params.get("uniqueId");

      if (name && name.trim() !== "") {
        var guestNameElement = document.getElementById("guestName");

        if (guestNameElement) {
          guestNameElement.textContent = "Dear " + name.trim() + ",";
        }
      }

      var rsvpLink = document.getElementById("rsvpLink");
      if (rsvpLink && uniqueId && uniqueId.trim() !== "") {
        rsvpLink.href = "https://azm-edu-invitation.com/azm/azm-RSPV.html?uniqueId=" + encodeURIComponent(uniqueId.trim());
      }
    })();
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>azm Academy Graduation Ceremony: 26 July 2026</title>
  <meta name="description" content="azm Academy Graduation Ceremony RSVP — 26 July 2026" />
  <meta property="og:title" content="azm Academy Graduation Ceremony: 26 July 2026" />
  <meta property="og:image" content="https://alqadsiahfestival.com/azm/azmlogos.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="preload" as="image" href="https://alqadsiahfestival.com/azm/azmlogos.jpg" />

  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      color: #37352F;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      background-color: #ffffff;
      margin: 0;
      min-height: 100vh;
    }

    img {
      border: 0 !important;
      border-style: none !important;
      outline: none !important;
      box-shadow: none !important;
      display: block;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 100%;
      line-height: 1.15;
      margin: 0;
    }

    /* ── App Wrapper ───────────────────────────────────────────── */
    .tally-app {
      display: flex;
      background: #ffffff;
      direction: ltr;
      overflow-x: hidden;
    }

    .tally-main {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
    }

    /* ── Cover Image ───────────────────────────────────────────── */
    .tally-form-cover {
      position: relative;
      z-index: 1;
    }

    .tally-cover-img {
      display: block;
      width: min(100%, 720px);
      max-width: 720px;
      height: auto;
      margin: 0 auto;
      object-fit: contain;
      border: 0 !important;
      border-style: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    /* ── Page / Form Content ────────────────────────────────────── */
    .tally-page {
      width: 100%;
      max-width: 700px;
      margin: auto;
      padding: 0 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Form Title ─────────────────────────────────────────────── */
    .tally-block-form-title {
      padding: 1.5rem 0 2.25rem;
    }

    .tally-block-form-title h1 {
      font-size: clamp(1.35rem, 2.3vw + 0.85rem, 2.45rem);
      font-weight: 800;
      line-height: 1.08;
      padding-bottom: 0;
      margin: 0;
      color: #37352F;
      letter-spacing: -0.02em;
      text-align: center;
      white-space: normal;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      max-width: 100%;
    }

    .tally-block-form-title h1 .title-line {
      display: block;
      font-size: inherit;
    }

    .tally-block-form-title h1 .title-date {
      display: block;
      color: #CB953F;
      font-weight: 400;
      margin-left: 0;
      font-size: 0.8em;
      line-height: 1.2;
      opacity: 0.95;
    }

    /* ── Choices Fieldset ───────────────────────────────────────── */
    .tally-choices {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    /* Visually hide the legend (Tally pattern) */
    .tally-choices legend {
      position: absolute;
      display: inline-block;
      max-width: 10px;
      text-indent: 100%;
      white-space: nowrap;
      overflow: hidden;
    }

    /* ── Individual Option ──────────────────────────────────────── */
    .tally-choice-block {
      padding: 1px 0;
    }

    .tally-choice-option-wrap {
      position: relative;
      padding-bottom: 10px;
    }

    /* The card that looks like the Tally option tile */
    .tally-choice-card {
      position: relative;
      display: inline-block;
      width: 100%;
      min-height: 36px;
      padding: 9px 10px;
      line-height: 1.125;
      box-shadow:
        rgba(0, 0, 0, 0.12) 0px 1px 1px 0px,
        rgba(61, 59, 53, 0.16) 0px 0px 0px 1px,
        rgba(61, 59, 53, 0.08) 0px 2px 5px 0px;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition:
        box-shadow 120ms ease-in-out,
        background-color 120ms ease-in-out;
    }

    @media (hover: hover) {
      .tally-choice-card:hover {
        box-shadow:
          rgba(0, 0, 0, 0.12) 0px 1px 1px 0px,
          rgba(61, 59, 53, 0.16) 0px 0px 0px 1px,
          rgba(61, 59, 53, 0.08) 0px 3px 9px 0px,
          rgba(61, 59, 53, 0.08) 0px 2px 5px 0px;
      }

      .tally-choice-card:focus-within {
        box-shadow:
          rgba(58, 145, 224, 0.36) 0px 0px 0px 4px,
          rgba(61, 59, 53, 0.16) 0px 0px 0px 1px;
      }
    }

    /* Selected state — blue ring + tinted background */
    .tally-choice-card.selected {
      box-shadow:
        #0070D7 0px 0px 0px 2px,
        rgba(61, 59, 53, 0.16) 0px 0px 0px 1px;
      background-color: rgba(0, 112, 215, 0.05);
    }

    /* Inner flex row */
    .tally-choice-content {
      display: flex;
      align-items: center;
      width: 100%;
    }

    /* Hidden radio — covers the whole card for click-anywhere UX */
    .tally-choice-content input[type="radio"] {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .tally-choice-content label {
      padding-left: 10px;
      cursor: pointer;
      color: #37352F;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.4;
      user-select: none;
      position: relative;
      /* sit above the invisible radio so the label still receives focus visuals */
      z-index: 1;
      pointer-events: none;
      /* let the radio handle the click */
    }

    /* ── Alphabet Badge ─────────────────────────────────────────── */
    .tally-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      background-color: #605e5a;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      color: #ffffff;
      border-radius: 3px;
      transition: background-color 120ms ease-in-out;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    .tally-choice-card.selected .tally-badge {
      background-color: #0070D7;
    }

    /* ── Confirmation Panel ─────────────────────────────────────── */
    .tally-confirmation {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 2rem 0 1rem;
      animation: fadeInUp 280ms ease-out forwards;
    }

    .tally-confirmation.show {
      display: flex;
    }

    .confirm-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.25rem;
    }

    .confirm-icon.accept-icon {
      background: rgba(20, 129, 32, 0.12);
      color: #148120;
    }

    .confirm-icon.decline-icon {
      background: rgba(178, 1, 16, 0.10);
      color: #B20110;
    }

    .tally-confirmation h2 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #37352F;
      line-height: 1.25;
    }

    .tally-confirmation p {
      font-size: 1rem;
      color: #605e5a;
      line-height: 1.6;
      max-width: 520px;
    }

    .tally-error {
      display: none;
      margin-top: 1.25rem;
      padding: 1.25rem 1rem;
      border-radius: 10px;
      border: 1px solid #f0c4c4;
      background: #fff6f6;
      color: #8a1f1f;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .tally-error.show {
      display: block;
    }

    .tally-error h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #8a1f1f;
    }

    .tally-error p {
      font-size: 0.98rem;
      line-height: 1.6;
      margin: 0;
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 758px) {
      .tally-page {
        max-width: min(700px, calc(100vw - 50px));
        margin-top: 40px;
        margin-bottom: 40px;
      }

      .tally-block-form-title h1 {
        font-size: clamp(1.15rem, 4vw, 1.8rem);
        padding-bottom: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="tally-app">
    <main class="tally-main">

      <!-- ── Cover Banner ── -->
      <div class="tally-form-cover" aria-hidden="true">
        <img class="tally-cover-img" src="https://alqadsiahfestival.com/azm/azmlogos.jpg"
          alt="azm Academy logo banner" />
      </div>

      <!-- ── Page Content ── -->
      <section class="tally-page" aria-labelledby="form-heading">
        <form id="rsvp-form" novalidate>

          <!-- Form Title -->
          <div class="tally-block-form-title">
            <h1 id="form-heading">
              <span class="title-line">azm Academy Graduation Ceremony</span>
              <span class="title-date">26 July 2026</span>
            </h1>
          </div>

          <!-- Multiple Choice Options -->
          <fieldset class="tally-choices" id="rsvp-fieldset" aria-required="true">
            <legend>Will you attend?</legend>

            <!-- Option A: Accept -->
            <div class="tally-choice-block">
              <div class="tally-choice-option-wrap">
                <div class="tally-choice-card" id="card-accept" role="presentation">
                  <div class="tally-choice-content">
                    <span class="tally-badge" aria-hidden="true">A</span>
                    <input id="choice-accept" type="radio" name="rsvp" value="accept" />
                    <label for="choice-accept">Accept</label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Option B: Decline -->
            <div class="tally-choice-block">
              <div class="tally-choice-option-wrap">
                <div class="tally-choice-card" id="card-decline" role="presentation">
                  <div class="tally-choice-content">
                    <span class="tally-badge" aria-hidden="true">B</span>
                    <input id="choice-decline" type="radio" name="rsvp" value="decline" />
                    <label for="choice-decline">Decline</label>
                  </div>
                </div>
              </div>
            </div>
          </fieldset>
        </form>

        <div class="tally-error" id="rsvp-error" tabindex="-1" role="alert" aria-live="assertive">
          <h2>Resubmission limit reached</h2>
          <p id="rsvp-error-message"></p>
        </div>

        <!-- ── Confirmation Message (injected by JS) ── -->
        <div class="tally-confirmation" id="confirmation-msg" tabindex="-1" aria-live="polite">
          <div class="confirm-icon" id="confirm-icon" aria-hidden="true"></div>
          <h2 id="confirm-heading"></h2>
          <p id="confirm-body"></p>
        </div>


      </section>

    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const baseURL = "https://udcwebapi2025-avdxdce9gngffkgx.uaenorth-01.azurewebsites.net";

      // Extract uniqueId from URL parameter
      var params = new URLSearchParams(window.location.search);
      var uniqueId = params.get('uniqueId');

      /* ── References ── */
      var form = document.getElementById('rsvp-form');
      var cardAccept = document.getElementById('card-accept');
      var cardDecline = document.getElementById('card-decline');
      var radioAccept = document.getElementById('choice-accept');
      var radioDecline = document.getElementById('choice-decline');
      var confirmation = document.getElementById('confirmation-msg');
      var confirmIcon = document.getElementById('confirm-icon');
      var confirmHead = document.getElementById('confirm-heading');
      var confirmBody = document.getElementById('confirm-body');
      var rsvpError = document.getElementById('rsvp-error');
      var rsvpErrorMessage = document.getElementById('rsvp-error-message');

      function showAccessError(message) {
        form.style.display = 'none';
        confirmation.classList.remove('show');
        rsvpErrorMessage.textContent = message;
        rsvpError.classList.add('show');
        rsvpError.focus();
      }

      async function checkRsvpEligibility() {
        if (!uniqueId) {
          showAccessError('You exceed a max limit of resubmision, please contact the organizer.');
          return;
        }

        try {
          const response = await fetch(`${baseURL}/api/Users/rsvp-check/${encodeURIComponent(uniqueId)}`);
          const data = await response.json();

          if (!response.ok || !data || data.success === false || data.canResubmit !== true) {
            showAccessError(
              data && data.message ? data.message : 'You exceed a max limit of resubmision, please contact the organizer.'
            );
            return;
          }

          form.style.display = 'block';
          rsvpError.classList.remove('show');
        } catch (e) {
          console.error('Error checking RSVP eligibility:', e);
          showAccessError('You exceed a max limit of resubmision, please contact the organizer.');
        }
      }

      /* ── API Call to update status ── */
      async function updateStatus(status) {
        if (!uniqueId) {
          console.warn('No uniqueId found in URL');
          return;
        }
        try {
          const response = await fetch(
            `${baseURL}/api/Users/user-status?uniqueId=${encodeURIComponent(uniqueId)}&status=${encodeURIComponent(status)}`,
            {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ success: true, status: status })
            }
          );
          if (!response.ok) {
            console.error('Status update failed:', response.status, response.statusText);
          }
        } catch (e) {
          console.error('Error updating status:', e);
        }
      }

      /* ── Inline SVG icons used in confirmation panel ── */
      var ICON_CHECK = [
        '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"',
        ' fill="none" stroke="currentColor" stroke-width="2.5"',
        ' stroke-linecap="round" stroke-linejoin="round">',
        '<polyline points="20 6 9 17 4 12"></polyline></svg>'
      ].join('');

      var ICON_X = [
        '<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"',
        ' fill="none" stroke="currentColor" stroke-width="2.5"',
        ' stroke-linecap="round" stroke-linejoin="round">',
        '<line x1="18" y1="6" x2="6" y2="18"></line>',
        '<line x1="6" y1="6" x2="18" y2="18"></line></svg>'
      ].join('');

      /* ── Update card visual state to match radio selection ── */
      function syncCards() {
        cardAccept.classList.toggle('selected', radioAccept.checked);
        cardDecline.classList.toggle('selected', radioDecline.checked);
      }

      /* ── Show thank-you / confirmation panel ── */
      function showConfirmation(type) {
        form.style.display = 'none';

        if (type === 'Accepted') {
          confirmIcon.className = 'confirm-icon accept-icon';
          confirmIcon.innerHTML = ICON_CHECK;
          confirmHead.textContent = "You're confirmed! \uD83C\uDF93";
          confirmBody.textContent = [
            "Thank you for accepting the invitation to the",
            "azm Academy Graduation Ceremony on 26 July 2026.",
            "We look forward to celebrating this milestone with you!"
          ].join(' ');
        } else {
          confirmIcon.className = 'confirm-icon decline-icon';
          confirmIcon.innerHTML = ICON_X;
          confirmHead.textContent = "We'll miss you.";
          confirmBody.textContent = [
            "Your response has been recorded. Thank you for letting us know.",
            "We hope to celebrate future azm Academy milestones with you."
          ].join(' ');
        }

        confirmation.classList.add('show');
        confirmation.focus();
      }

      /* ── Listen for radio changes/clicks (instant submission) ── */
      radioAccept.addEventListener('change', function () {
        if (radioAccept.checked) {
          syncCards();
          // Call API then show confirmation
          updateStatus('Accepted').then(function () {
            setTimeout(function () {
              showConfirmation('Accepted');
            }, 180);
          });
        }
      });

      radioDecline.addEventListener('change', function () {
        if (radioDecline.checked) {
          syncCards();
          // Call API then show confirmation
          updateStatus('Declined').then(function () {
            setTimeout(function () {
              showConfirmation('Declined');
            }, 180);
          });
        }
      });

      /* Allow clicking anywhere on card to check the radio input */
      cardAccept.addEventListener('click', function () {
        if (!radioAccept.checked) {
          radioAccept.checked = true;
          // Dispatch change event to trigger handling
          radioAccept.dispatchEvent(new Event('change'));
        }
      });

      cardDecline.addEventListener('click', function () {
        if (!radioDecline.checked) {
          radioDecline.checked = true;
          // Dispatch change event to trigger handling
          radioDecline.dispatchEvent(new Event('change'));
        }
      });

      checkRsvpEligibility();

      /* ── Keyboard shortcuts: A = Accept, B = Decline ── */
      document.addEventListener('keydown', function (e) {
        if (confirmation.classList.contains('show')) return;
        var tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

        if (e.key === 'a' || e.key === 'A') {
          radioAccept.checked = true;
          radioAccept.dispatchEvent(new Event('change'));
        } else if (e.key === 'b' || e.key === 'B') {
          radioDecline.checked = true;
          radioDecline.dispatchEvent(new Event('change'));
        }
      });

    }());
  </script>
</body>

</html>
